name: 譁ｰ險倅ｺ九ｒX縺ｫ閾ｪ蜍墓兜遞ｿ

on:
  push:
    branches:
      - main
    paths:
      - 'astro-site/src/content/articles/**/*.md'

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 繝ｪ繝昴ず繝医Μ繧偵メ繧ｧ繝・け繧｢繧ｦ繝・        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Node.js 繧ｻ繝・ヨ繧｢繝・・
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 萓晏ｭ倥ヱ繝・こ繝ｼ繧ｸ縺ｮ繧､繝ｳ繧ｹ繝医・繝ｫ
        run: npm install twitter-api-v2 gray-matter

      - name: 譁ｰ縺励＞險倅ｺ九ヵ繧｡繧､繝ｫ繧呈､懷・縺励※X謚慕ｨｿ
        env:
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          # 莉雁屓縺ｮpush縺ｧ霑ｽ蜉縺輔ｌ縺櫪D繝輔ぃ繧､繝ｫ繧貞叙蠕・          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD | grep 'astro-site/src/content/articles/.*\.md' || true)

          if [ -z "$NEW_FILES" ]; then
            echo "譁ｰ縺励＞險倅ｺ九ヵ繧｡繧､繝ｫ縺ｯ縺ゅｊ縺ｾ縺帙ｓ縲ゅせ繧ｭ繝・・縺励∪縺吶・
            exit 0
          fi

          echo "謚慕ｨｿ蟇ｾ雎｡繝輔ぃ繧､繝ｫ:"
          echo "$NEW_FILES"

          # 蜷・ヵ繧｡繧､繝ｫ縺ｫ蟇ｾ縺励※謚慕ｨｿ繧ｹ繧ｯ繝ｪ繝励ヨ繧貞ｮ溯｡・          echo "$NEW_FILES" | while read FILE; do
            if [ -f "$FILE" ]; then
              node astro-site/scripts/post-to-x.mjs "$FILE"
            fi
          done
