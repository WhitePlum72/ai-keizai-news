name: Auto post to X

on:
  push:
    branches:
      - main
    paths:
      - 'astro-site/src/content/articles/**/*.md'

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install twitter-api-v2 gray-matter

      - name: Detect new articles and post to X
        env:
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD | grep 'astro-site/src/content/articles/.*\.md' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "No new articles. Skipping."
            exit 0
          fi
          echo "Target files:"
          echo "$NEW_FILES"
          echo "$NEW_FILES" | while read FILE; do
            if [ -f "$FILE" ]; then
              node astro-site/scripts/post-to-x.mjs "$FILE"
            fi
          done